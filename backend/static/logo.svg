<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB700"/>
      <stop offset="35%" style="stop-color:#FF4EA0"/>
      <stop offset="70%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
    <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="50%" style="stop-color:#FF3CAC"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2020"/>
      <stop offset="100%" style="stop-color:#CC0000"/>
    </linearGradient>
  </defs>

  <!-- Bag body -->
  <path d="M130 180 L130 370 Q130 395 155 395 L345 395 Q370 395 370 370 L370 180 Z"
        fill="none" stroke="url(#bagGrad)" stroke-width="14" stroke-linejoin="round"/>
  <!-- Bag handle -->
  <path d="M195 180 Q195 115 250 115 Q305 115 305 180"
        fill="none" stroke="url(#bagGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Cursor -->
  <g transform="translate(100, 255) rotate(-20)">
    <path d="M0 0 L0 60 L16 43 L28 70 L38 66 L26 39 L48 39 Z"
          fill="url(#cursorGrad)"/>
    <line x1="-13" y1="53" x2="-4" y2="44" stroke="url(#cursorGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="-20" y1="64" x2="-9" y2="54" stroke="url(#cursorGrad)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="-27" y1="75" x2="-14" y2="64" stroke="url(#cursorGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- H2P Vision -->
  <text x="250" y="445"
        font-family="Arial Black, Arial, sans-serif"
        font-size="54" font-weight="900"
        fill="url(#textGrad)"
        text-anchor="middle">H2P Vision</text>

  <!-- Tagline -->
  <text x="250" y="485"
        font-family="Georgia, serif"
        font-size="20" font-style="italic"
        fill="#ffffff" text-anchor="middle" opacity="0.9">Trust before you buy</text>
</svg>
